<!DOCTYPE html>

<html>

<head>
  <meta charset="UTF-8">
  <title>Vinyl Audio Image</title>

  <style>
    body {
      background: #111;
      color: white;
      font-family: sans-serif;
      text-align: center;
      margin: 0;
    }

    .tabbar {
      display: flex;
      background: #1a1a1a;
      border-bottom: 2px solid #333;
    }

    .tabbtn {
      flex: 1;
      padding: 14px;
      cursor: pointer;
      border: none;
      background: #1a1a1a;
      color: #aaa;
      font-size: 16px;
    }

    .tabbtn.active {
      background: #111;
      color: white;
      border-bottom: 3px solid #4cafef;
    }

    .tab {
      display: none;
      padding: 25px;
    }

    .tab.active {
      display: block;
    }

    canvas {
      width: 420px;
      height: 420px;
      border-radius: 50%;
      box-shadow: 0 0 25px black;
      margin-top: 20px;
    }

    button {
      padding: 10px 20px;
      margin: 8px;
      border: none;
      background: #333;
      color: white;
      cursor: pointer;
      transition: .15s;
    }

    button:hover {
      background: #444;
    }

    button:active {
      transform: scale(.95);
      background: #222;
    }

    #status {
      margin-top: 10px;
      color: #aaa;
    }

    .rotate {
      animation: spin 7s linear infinite;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg)
      }

      to {
        transform: rotate(360deg)
      }
    }
  </style>

</head>

<body>

  <div class="tabbar">
    <button class="tabbtn active" onclick="openTab(0)">Record Generator</button>
    <button class="tabbtn" onclick="openTab(1)">Music Player</button>
  </div>

  <div class="tab active">

    <h3>Generate Record</h3>

    <input type="file" id="audioInput" accept="audio/*"><br>

    <button id="encodeBtn">Create Record</button> <button id="saveBtn">Save Image</button>

    <div id="status"></div>

    <canvas id="encodeCanvas" width="4096" height="4096"></canvas>

  </div>

  <div class="tab">

    <h3>Play From Record Image</h3>

    <input type="file" id="imageInput" accept="image/png"><br>

    <button id="decodeBtn">Load Record</button>

    <br>

    <canvas id="playCanvas" width="1024" height="1024"></canvas>

    <br>

    <button id="playBtn">Play</button> <button id="pauseBtn">Pause</button>

  </div>

  <script>

    const SIZE = 4096

    function openTab(n) {

      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"))
      document.querySelectorAll(".tabbtn").forEach(b => b.classList.remove("active"))

      document.querySelectorAll(".tab")[n].classList.add("active")
      document.querySelectorAll(".tabbtn")[n].classList.add("active")

    }

    /* ===== 音声特徴 ===== */

    function hashBytes(bytes) {

      let h = 0

      for (let i = 0; i < bytes.length; i += 5000) {
        h = ((h << 5) - h) + bytes[i]
        h |= 0
      }

      return Math.abs(h)

    }

    function analyzeSpectrum(samples) {

      let low = 0, mid = 0, high = 0

      for (let i = 0; i < samples.length; i += 200) {

        let v = Math.abs(samples[i])

        if (i % 3 === 0) low += v
        else if (i % 3 === 1) mid += v
        else high += v

      }

      let sum = low + mid + high

      return {
        low: low / sum,
        mid: mid / sum,
        high: high / sum
      }

    }

    /* ===== レコード描画 ===== */

    function drawRecord(ctx, samples, hash, spectrum) {

      const cx = SIZE / 2
      const cy = SIZE / 2

      ctx.fillStyle = "black"
      ctx.fillRect(0, 0, SIZE, SIZE)

      let theta = 0
      let r = 200

      const step = samples.length / 60000

      const palette = hash % 360
      const pattern = (hash % 7) + 1

      ctx.lineWidth = 1.2

      for (let i = 0; i < 60000; i++) {

        let idx = Math.floor(i * step)
        let s = samples[idx] || 0

        let amp = Math.abs(s) * 300

        r += 0.05

        let x = cx + (r + amp * Math.sin(i * pattern * .02)) * Math.cos(theta)
        let y = cy + (r + amp * Math.sin(i * pattern * .02)) * Math.sin(theta)

        let hue = (palette + i * .3) % 360
        let sat = 60 + spectrum.low * 40
        let light = 40 + spectrum.mid * 20 + Math.abs(s) * 20

        ctx.strokeStyle = `hsl(${hue},${sat}%,${light}%)`

        ctx.beginPath()

        let x2 = cx + (r + amp * Math.cos(i * pattern * .02)) * Math.cos(theta + .01)
        let y2 = cy + (r + amp * Math.cos(i * pattern * .02)) * Math.sin(theta + .01)

        ctx.moveTo(x, y)
        ctx.lineTo(x2, y2)
        ctx.stroke()

        theta += .015

      }

    }

    /* ===== データ埋め込み ===== */

    function embedData(ctx, bytes) {

      const header = new Uint8Array(8)

      header[0] = 86
      header[1] = 83
      header[2] = 82
      header[3] = 49

      new DataView(header.buffer).setUint32(4, bytes.length)

      const full = new Uint8Array(header.length + bytes.length)

      full.set(header)
      full.set(bytes, 8)

      const imgData = ctx.getImageData(0, 0, SIZE, SIZE)
      const data = imgData.data

      let bitIndex = 0

      function getBits(n) {

        let val = 0

        for (let i = 0; i < n; i++) {

          let byteIndex = Math.floor(bitIndex / 8)
          let bit = 7 - (bitIndex % 8)

          if (byteIndex < full.length) {
            val |= ((full[byteIndex] >> bit) & 1) << (n - i - 1)
          }

          bitIndex++

        }

        return val

      }

      for (let i = 0; i < data.length; i += 4) {

        let r = getBits(2)
        let g = getBits(2)
        let b = getBits(2)

        data[i] = (data[i] & 252) | r
        data[i + 1] = (data[i + 1] & 252) | g
        data[i + 2] = (data[i + 2] & 252) | b

      }

      ctx.putImageData(imgData, 0, 0)

    }

    /* ===== 生成 ===== */

    document.getElementById("encodeBtn").onclick = async () => {

      let file = document.getElementById("audioInput").files[0]

      if (!file) {
        alert("音楽ファイルを選択してください")
        return
      }

      document.getElementById("status").textContent = "Loading..."

      let buffer = await file.arrayBuffer()
      let bytes = new Uint8Array(buffer)

      let audioCtx = new AudioContext()

      let audioBuffer = await audioCtx.decodeAudioData(buffer.slice(0))
      let samples = audioBuffer.getChannelData(0)

      let hash = hashBytes(bytes)
      let spectrum = analyzeSpectrum(samples)

      let canvas = document.getElementById("encodeCanvas")
      let ctx = canvas.getContext("2d")

      drawRecord(ctx, samples, hash, spectrum)

      embedData(ctx, bytes)

      document.getElementById("status").textContent = "Record ready ✔"

    }

    /* ===== 保存 ===== */

    document.getElementById("saveBtn").onclick = async () => {

      let canvas = document.getElementById("encodeCanvas")

      const blob = await new Promise(r => canvas.toBlob(r))

      const handle = await window.showSaveFilePicker({

        suggestedName: "record.png",

        types: [{
          description: "PNG Image",
          accept: { "image/png": [".png"] }
        }]

      })

      const writable = await handle.createWritable()

      await writable.write(blob)
      await writable.close()

    }

    /* ===== 復元 ===== */

    function extractData(ctx, w, h) {

      let imgData = ctx.getImageData(0, 0, w, h)
      let data = imgData.data

      let bits = []

      for (let i = 0; i < data.length; i += 4) {

        bits.push(data[i] & 3)
        bits.push(data[i + 1] & 3)
        bits.push(data[i + 2] & 3)

      }

      let bytes = []

      for (let i = 0; i < bits.length; i += 4) {

        let val = (bits[i] << 6) | (bits[i + 1] << 4) | (bits[i + 2] << 2) | (bits[i + 3])
        bytes.push(val)

      }

      return new Uint8Array(bytes)

    }

    /* ===== player ===== */

    let audioCtx = new AudioContext()
    let audioBufferGlobal = null
    let source = null

    let startTime = 0
    let pauseTime = 0

    document.getElementById("decodeBtn").onclick = () => {

      let file = document.getElementById("imageInput").files[0]

      if (!file) {
        alert("PNG画像を選択してください")
        return
      }

      let img = new Image()

      img.onload = () => {

        let canvas = document.getElementById("playCanvas")
        let ctx = canvas.getContext("2d")

        ctx.clearRect(0, 0, canvas.width, canvas.height)
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height)

        let temp = document.createElement("canvas")
        temp.width = img.width
        temp.height = img.height

        let tctx = temp.getContext("2d")
        tctx.drawImage(img, 0, 0)

        let raw = extractData(tctx, img.width, img.height)

        if (raw[0] != 86 || raw[1] != 83 || raw[2] != 82 || raw[3] != 49) {
          alert("音声データが見つかりません")
          return
        }

        let len = new DataView(raw.buffer).getUint32(4)

        let audioBytes = raw.slice(8, 8 + len)

        audioCtx.decodeAudioData(audioBytes.buffer).then(buf => {
          audioBufferGlobal = buf
        })

      }

      img.src = URL.createObjectURL(file)

    }

    /* ===== 再生 ===== */

    document.getElementById("playBtn").onclick = () => {

      if (!audioBufferGlobal) {
        alert("先に画像を読み込んでください")
        return
      }

      source = audioCtx.createBufferSource()

      source.buffer = audioBufferGlobal
      source.connect(audioCtx.destination)

      startTime = audioCtx.currentTime - pauseTime

      source.start(0, pauseTime)

      document.getElementById("playCanvas").classList.add("rotate")

    }

    /* ===== pause ===== */

    document.getElementById("pauseBtn").onclick = () => {

      if (source) {

        source.stop()

        pauseTime = audioCtx.currentTime - startTime

      }

      document.getElementById("playCanvas").classList.remove("rotate")

    }

  </script>

</body>

</html>
