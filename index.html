<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vinyl Audio Image</title>
  <style>
    :root {
      --bg: #111;
      --panel: #1a1a1a;
      --accent: #4cafef;
      --text: #e0e0e0;
      --border: #333;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      margin: 0;
      padding-bottom: 50px;
      line-height: 1.5;
    }

    .container {
      width: 90%;
      max-width: 500px;
      margin: 0 auto;
    }

    header {
      padding: 40px 15px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 1.8rem;
      letter-spacing: -1px;
    }

    .tabbar {
      display: flex;
      background: var(--panel);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--border);
    }

    .tabbtn {
      flex: 1;
      padding: 15px;
      cursor: pointer;
      border: none;
      background: transparent;
      color: #777;
      font-size: 14px;
      font-weight: bold;
      transition: 0.3s;
    }

    .tabbtn.active {
      color: var(--accent);
      border-bottom: 3px solid var(--accent);
    }

    .tab {
      display: none;
      padding: 30px 10px;
      text-align: center;
    }

    .tab.active {
      display: block;
    }

    /* Custom File Input */
    .file-input-group {
      margin: 20px 0;
    }

    .custom-file-upload {
      display: block;
      background: #252525;
      border: 1px dashed #444;
      padding: 20px;
      border-radius: 10px;
      cursor: pointer;
      margin-bottom: 10px;
      transition: 0.2s;
    }

    .custom-file-upload:hover {
      border-color: var(--accent);
    }

    input[type="file"] {
      display: none;
    }

    .file-name {
      font-size: 0.8rem;
      color: #888;
      display: block;
      margin-top: 5px;
      word-break: break-all;
    }

    canvas {
      width: 100%;
      max-width: 400px;
      height: auto;
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
      margin: 25px 0;
      background: #000;
    }

    button {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
      background: #333;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:active {
      transform: scale(0.98);
    }

    #encodeBtn,
    #decodeBtn {
      background: var(--accent);
      color: #000;
    }

    #status,
    #playStatus {
      margin: 15px 0;
      font-size: 0.9rem;
      font-weight: bold;
      color: var(--accent);
    }

    .rotate {
      animation: spin 8s linear infinite;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg)
      }

      to {
        transform: rotate(360deg)
      }
    }

    @media (min-width: 600px) {
      .container {
        max-width: 600px;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>Vinyl Audio Image</h1>
    <p style="font-size: 0.9rem; color: #666;">Convert audio to steganographic art</p>
  </header>

  <div class="container">
    <div class="tabbar">
      <button class="tabbtn active" onclick="openTab(0)">Generator</button>
      <button class="tabbtn" onclick="openTab(1)">Player</button>
    </div>

    <div class="tab active">
      <h3>Create Record</h3>
      <div class="file-input-group">
        <label for="audioInput" class="custom-file-upload">
          Choose Audio File...
        </label>
        <input type="file" id="audioInput" accept=".mp3,.wav,.m4a,.ogg,audio/*">
        <span id="audioFileName" class="file-name">No file selected</span>
      </div>

      <button id="encodeBtn">Generate Image</button>
      <button id="saveBtn">Save PNG</button>

      <div id="status">Ready</div>
      <canvas id="encodeCanvas" width="2048" height="2048"></canvas>
    </div>

    <div class="tab">
      <h3>Play Record</h3>
      <div class="file-input-group">
        <label for="imageInput" class="custom-file-upload">
          Choose Record Image...
        </label>
        <input type="file" id="imageInput" accept="image/png,image/*">
        <span id="imageFileName" class="file-name">No file selected</span>
        <span style="font-size: 0.7rem; color: #cc6666;">* Please select the original PNG file.</span>
      </div>

      <button id="decodeBtn">Load Record</button>
      <div id="playStatus">Waiting...</div>

      <canvas id="playCanvas" width="1024" height="1024"></canvas>
      <div style="display: flex; gap: 10px;">
        <button id="playBtn">Play</button>
        <button id="pauseBtn">Pause</button>
      </div>
    </div>
  </div>

  <script>
    const SIZE = 2048;
    const MAX_DURATION = 600; // 10 minutes

    // UI: Show selected filename
    document.getElementById('audioInput').onchange = e => {
      document.getElementById('audioFileName').textContent = e.target.files[0]?.name || "No file selected";
    };
    document.getElementById('imageInput').onchange = e => {
      document.getElementById('imageFileName').textContent = e.target.files[0]?.name || "No file selected";
    };

    function openTab(n) {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".tabbtn").forEach(b => b.classList.remove("active"));
      document.querySelectorAll(".tab")[n].classList.add("active");
      document.querySelectorAll(".tabbtn")[n].classList.add("active");
    }

    /* --- Math Functions --- */
    function hashBytes(bytes) {
      let h = 0;
      for (let i = 0; i < bytes.length; i += 5000) {
        h = ((h << 5) - h) + bytes[i];
        h |= 0;
      }
      return Math.abs(h);
    }

    function analyzeSpectrum(samples) {
      let low = 0, mid = 0, high = 0;
      for (let i = 0; i < samples.length; i += 200) {
        let v = Math.abs(samples[i]);
        if (i % 3 === 0) low += v;
        else if (i % 3 === 1) mid += v;
        else high += v;
      }
      let sum = low + mid + high || 1;
      return { low: low / sum, mid: mid / sum, high: high / sum };
    }

    /* --- Core Engine (2048px Optimized) --- */
    function drawRecord(ctx, samples, hash, spectrum) {
      const cx = SIZE / 2;
      const cy = SIZE / 2;
      ctx.fillStyle = "black";
      ctx.fillRect(0, 0, SIZE, SIZE);

      let theta = 0;
      let r = SIZE * 0.08;
      const iterations = 70000;
      const step = samples.length / iterations;
      const palette = hash % 360;

      ctx.lineWidth = 1.2;
      for (let i = 0; i < iterations; i++) {
        let s = samples[Math.floor(i * step)] || 0;
        let amp = Math.abs(s) * (SIZE * 0.1);
        r += (SIZE * 0.000005);

        let x = cx + (r + amp) * Math.cos(theta);
        let y = cy + (r + amp) * Math.sin(theta);

        ctx.strokeStyle = `hsl(${(palette + i * 0.15) % 360}, 65%, ${35 + Math.abs(s) * 40}%)`;
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(cx + (r + amp) * Math.cos(theta + 0.01), cy + (r + amp) * Math.sin(theta + 0.01));
        ctx.stroke();
        theta += 0.012;
      }
    }

    // Improved Embedding (4 bits per channel)
    function embedData(ctx, bytes) {
      const header = new Uint8Array(8);
      header.set([86, 83, 82, 49]); // VSR1
      new DataView(header.buffer).setUint32(4, bytes.length);

      const full = new Uint8Array(header.length + bytes.length);
      full.set(header);
      full.set(bytes, 8);

      const imgData = ctx.getImageData(0, 0, SIZE, SIZE);
      const data = imgData.data;

      let byteIdx = 0;
      let halfByte = false; // To track 4-bit chunks

      for (let i = 0; i < data.length && byteIdx < full.length; i += 4) {
        for (let j = 0; j < 3; j++) { // R, G, B
          if (byteIdx < full.length) {
            const val = halfByte ? (full[byteIdx] & 0x0F) : (full[byteIdx] >> 4);
            data[i + j] = (data[i + j] & 0xF0) | val;

            if (halfByte) byteIdx++;
            halfByte = !halfByte;
          }
        }
      }
      ctx.putImageData(imgData, 0, 0);
    }

    function extractData(ctx, w, h) {
      const imgData = ctx.getImageData(0, 0, w, h);
      const data = imgData.data;
      const bytes = [];

      let currentByte = 0;
      let halfByte = false;

      for (let i = 0; i < data.length; i += 4) {
        for (let j = 0; j < 3; j++) {
          const val = data[i + j] & 0x0F;
          if (!halfByte) {
            currentByte = val << 4;
          } else {
            currentByte |= val;
            bytes.push(currentByte);
            // Check header early
            if (bytes.length === 4) {
              if (bytes[0] !== 86 || bytes[1] !== 83) return new Uint8Array();
            }
          }
          halfByte = !halfByte;
          // Stop if we have enough? (For speed we could stop here if we read the length)
        }
      }
      return new Uint8Array(bytes);
    }

    /* --- Event Handlers --- */
    document.getElementById("encodeBtn").onclick = async () => {
      const file = document.getElementById("audioInput").files[0];
      if (!file) return alert("Select audio!");

      const status = document.getElementById("status");
      status.textContent = "Decoding...";

      const audioCtx = new AudioContext();
      const arrayBuffer = await file.arrayBuffer();

      try {
        const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer.slice(0));
        if (audioBuffer.duration > MAX_DURATION) {
          return alert("Too long! Max 10 min.");
        }

        status.textContent = "Painting...";
        await new Promise(r => setTimeout(r, 50));

        const samples = audioBuffer.getChannelData(0);
        const canvas = document.getElementById("encodeCanvas");
        const ctx = canvas.getContext("2d");

        drawRecord(ctx, samples, hashBytes(new Uint8Array(arrayBuffer)), analyzeSpectrum(samples));
        embedData(ctx, new Uint8Array(arrayBuffer));

        status.textContent = "Complete! ✔";
      } catch (e) {
        status.textContent = "Error.";
        console.error(e);
      }
    };

    document.getElementById("saveBtn").onclick = () => {
      const canvas = document.getElementById("encodeCanvas");
      const link = document.createElement("a");
      link.download = "vinyl_record.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    };

    let audioCtxPlayer = new AudioContext();
    let audioBufferGlobal = null;
    let source = null;
    let startTime = 0, pauseTime = 0;

    document.getElementById("decodeBtn").onclick = () => {
      const file = document.getElementById("imageInput").files[0];
      if (!file) return alert("Select image!");

      const status = document.getElementById("playStatus");
      status.textContent = "Reading pixels...";

      const img = new Image();
      img.onload = () => {
        const canvas = document.getElementById("playCanvas");
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        const temp = document.createElement("canvas");
        temp.width = img.width; temp.height = img.height;
        const tctx = temp.getContext("2d");
        tctx.drawImage(img, 0, 0);

        const raw = extractData(tctx, img.width, img.height);
        if (raw.length < 8) return alert("Invalid Record Image");

        const len = new DataView(raw.buffer).getUint32(4);
        const audioData = raw.slice(8, 8 + len);

        audioCtxPlayer.decodeAudioData(audioData.buffer).then(buf => {
          audioBufferGlobal = buf;
          status.textContent = "Loaded!";
        }).catch(() => status.textContent = "Load failed.");
      };
      img.src = URL.createObjectURL(file);
    };

    document.getElementById("playBtn").onclick = () => {
      if (!audioBufferGlobal) return;
      if (source) source.stop();
      source = audioCtxPlayer.createBufferSource();
      source.buffer = audioBufferGlobal;
      source.connect(audioCtxPlayer.destination);
      source.start(0, pauseTime);
      startTime = audioCtxPlayer.currentTime - pauseTime;
      document.getElementById("playCanvas").classList.add("rotate");
    };

    document.getElementById("pauseBtn").onclick = () => {
      if (source) {
        source.stop();
        pauseTime = audioCtxPlayer.currentTime - startTime;
      }
      document.getElementById("playCanvas").classList.remove("rotate");
    };
  </script>

</body>

</html>
